name: Format and Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  fmt:
    uses: umatare5/common/.github/workflows/go-test-fmt.yml@7cfc52a86a80be5604880082503cf36fada25704 # v0.14.0
    with:
      go_version: "1.25.2"
      golangci_lint_version: "v2.4.0"
      golangci_lint_config: ".golangci.yml"
