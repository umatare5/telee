name: CodeQL Analysis

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Run weekly on Sundays at 12:00 UTC
    - cron: "0 12 * * 0"

permissions:
  security-events: write
  packages: read

jobs:
  codeql:
    uses: umatare5/common/.github/workflows/codeql.yml@7cfc52a86a80be5604880082503cf36fada25704 # v0.14.0
