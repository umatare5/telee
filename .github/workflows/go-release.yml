name: Release Application

on:
  push:
    branches: [ "main" ]
    paths: [ "VERSION" ]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  tagging:
    uses: umatare5/common/.github/workflows/tagging.yml@7cfc52a86a80be5604880082503cf36fada25704 # v0.14.0

  release:
    uses: umatare5/common/.github/workflows/go-release.yml@7cfc52a86a80be5604880082503cf36fada25704 # v0.14.0
    with:
      go_version: "1.25.2"
      goreleaser_version: "v2.11.1"
